name: Build Images

on:
  push:
    branches: [main]
    paths: ['build/**/Dockerfile']
  workflow_dispatch:
    inputs:
      image:
        description: 'Image to build (leave empty for all)'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - context: build/docker-tar1090-uuid
            image: ghcr.io/bharatradar/docker-tar1090-uuid
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check if this image should build
        id: should-build
        run: |
          if [ -n "${{ github.event.inputs.image }}" ] && [ "${{ github.event.inputs.image }}" != "${{ matrix.image }}" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Login to GHCR
        if: steps.should-build.outputs.skip != 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        if: steps.should-build.outputs.skip != 'true'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: steps.should-build.outputs.skip != 'true'
        uses: docker/setup-buildx-action@v3

      - name: Docker meta
        if: steps.should-build.outputs.skip != 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image }}
          tags: |
            type=sha,format=short
            type=raw,value=latest

      - name: Build and push
        if: steps.should-build.outputs.skip != 'true'
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
