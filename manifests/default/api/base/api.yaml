apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
spec:
  template:
    spec:
      imagePullSecrets:
      - name: ghcr-secret
      containers:
      - name: api
        image: ghcr.io/bharatradar/api:5.0.0
        imagePullPolicy: Always
        envFrom:
        - configMapRef:
            name: api-salts
        env:
        - name: ADSBLOL_INGEST_DNS
          value: "ingest-readsb-headless.bharatradar.svc.cluster.local"
        - name: MY_DOMAIN
          value: "my.bharat-radar.vellur.in"
        - name: ADSBLOL_REDIS_HOST
          value: "redis://:pXlpa1DdLpEn4Lih93H8l2zx42C0ThcTwBuHFiqA@192.168.200.187:6379"
        - name: ADSBLOL_REAPI_ENDPOINT
          value: "http://reapi-readsb.bharatradar.svc.cluster.local:30152/re-api/"
        - name: ADSBLOL_STATS_URL
          value: "http://hub-readsb.bharatradar.svc.cluster.local:150/stats.json"
        - name: ADSBLOL_ENABLED_BG_TASKS
          value: "_fetch_hub_stats,_fetch_ingest,_fetch_mlat,_loop"
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 1
            memory: 1Gi
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 8080
          name: http
        volumeMounts:
        - name: api-index
          mountPath: /usr/share/nginx/html/index.html
          subPath: index.html
          readOnly: true
        - name: nginx-conf
          mountPath: /etc/nginx/conf.d/default.conf
          subPath: nginx.conf
          readOnly: true
        resources:
          requests:
            cpu: 25m
            memory: 32Mi
          limits:
            cpu: 50m
            memory: 64Mi
      volumes:
      - name: api-index
        configMap:
          name: api-index
      - name: nginx-conf
        configMap:
          name: api-nginx-conf
---
kind: Service
apiVersion: v1
metadata:
  name: api
spec:
  ports:
  - port: 80
    targetPort: 8080
    name: http
  - port: 8000
    targetPort: 80
    name: api-internal
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: api
spec:
  selector:
    matchLabels:
      app: api
  endpoints:
  - port: http
