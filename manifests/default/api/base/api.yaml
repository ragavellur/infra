apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
spec:
  template:
    spec:
      imagePullSecrets:
      - name: ghcr-secret
      containers:
      - name: api
        image: ghcr.io/bharatradar/api:latest
        imagePullPolicy: Always
        envFrom:
        - configMapRef:
            name: api-salts
        env:
        - name: ADSBLOL_INGEST_DNS
          value: "ingest-readsb-headless.bharatradar.svc.cluster.local"
        - name: MY_DOMAIN
          value: "my.bharat-radar.vellur.in"
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 1
            memory: 256Mi
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 8080
          name: http
        volumeMounts:
        - name: api-index
          mountPath: /usr/share/nginx/html/index.html
          subPath: index.html
          readOnly: true
        - name: nginx-conf
          mountPath: /etc/nginx/conf.d/default.conf
          subPath: nginx.conf
          readOnly: true
        resources:
          requests:
            cpu: 25m
            memory: 32Mi
          limits:
            cpu: 50m
            memory: 64Mi
      volumes:
      - name: api-index
        configMap:
          name: api-index
      - name: nginx-conf
        configMap:
          name: api-nginx-conf
---
kind: Service
apiVersion: v1
metadata:
  name: api
spec:
  ports:
  - port: 80
    targetPort: 8080
    name: http
  - port: 8000
    targetPort: 80
    name: api-internal
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: api
spec:
  selector:
    matchLabels:
      app: api
  endpoints:
  - port: http
