resources:
- ../base
namePrefix: external-
images:
- name: ghcr.io/sdr-enthusiasts/docker-tar1090:latest
  newName: ghcr.io/sdr-enthusiasts/docker-readsb-protobuf
  newTag: latest
patches:
- target:
    kind: Deployment
  patch: |-
    - op: replace
      path: /spec/template/spec/containers/0/command
      value: ["/init"]
    - op: add
      path: /spec/template/spec/containers/0/env/-
      value:
        name: READSB_NET_BEAST_INPUT_PORT
        value: "30004"
