resources:
- ../base
namePrefix: ingest-
commonLabels:
  service: public
images:
- name: ghcr.io/sdr-enthusiasts/docker-tar1090:latest
  newName: ghcr.io/sdr-enthusiasts/docker-readsb-protobuf
  newTag: latest
patches:
- target:
    kind: Deployment
  patch: |-
    - op: replace
      path: /spec/template/spec/containers/0/command
      value: ["/init"]
    - op: add
      path: /spec/template/spec/containers/0/env/-
      value:
        name: READSB_NET_INGEST_MODE
        value: "true"
    - op: add
      path: /spec/template/spec/containers/0/env/-
      value:
        name: READSB_NET_BEAST_OUTPUT_PORT
        value: "30005"
    - op: add
      path: /spec/template/spec/containers/0/env/-
      value:
        name: READSB_MAX_RANGE
        value: "99999"
    - op: add
      path: /spec/template/spec/containers/0/env/-
      value:
        name: READSB_DEVICE_TYPE
        value: "none"
    - op: replace
      path: /spec/template/spec/containers/0/livenessProbe
      value: null
    - op: replace
      path: /spec/template/spec/containers/0/readinessProbe
      value: null
    - op: replace
      path: /spec/template/spec/containers/0/startupProbe
      value: null
