apiVersion: apps/v1
kind: Deployment
metadata:
  name: history
spec:
  template:
    spec:
      imagePullSecrets:
      - name: ghcr-secret
      volumes:
      - name: nginx-conf
        configMap:
          name: history-nginx-conf
      - name: adsblol-history
        emptyDir: {}
      containers:
      - name: history
        image: ghcr.io/bharatradar/history:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: http-api
        livenessProbe:
          tcpSocket:
            port: 8080
          initialDelaySeconds: 15
        readinessProbe:
          tcpSocket:
            port: 8080
          initialDelaySeconds: 15
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 1
            memory: 512Mi
        volumeMounts:
        - name: adsblol-history
          mountPath: /out
      - name: nginx
        image: nginx:alpine
        volumeMounts:
        - name: nginx-conf
          mountPath: /etc/nginx/conf.d/default.conf
          subPath: default.conf
          readOnly: true
        ports:
        - containerPort: 80
          name: http-nginx
        resources:
          requests:
            cpu: 100m
            memory: 64Mi
          limits:
            cpu: 1
            memory: 256Mi
---
kind: Service
apiVersion: v1
metadata:
  name: history
spec:
  ports:
  - port: 8080
    name: http-api
  - port: 80
    name: http-nginx
